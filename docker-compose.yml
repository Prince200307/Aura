version: '3.8'

services:
  backend:
    build:
      context: ./aura-backend
    ports:
      - "8000:8000"
    env_file:
      - ./aura-backend/.env
    volumes:
      - ./aura-backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./aura-frontend
    ports:
      - "3001:3001"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./aura-frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped